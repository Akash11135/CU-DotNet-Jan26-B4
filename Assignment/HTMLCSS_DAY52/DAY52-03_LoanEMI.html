<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMI</title>

    <style>
       

        input {
            padding: 0.75rem;
            outline: none;
            border: 1px solid rgba(128, 128, 128, 0.35);
            border-radius: 6px;
            width: 70%;
        }

        input:focus {
            border: 1px solid rgb(107, 107, 212);
        }

       

        button {
            padding: 0.75rem 1rem;
            border: none;
            background-color: rgb(107, 107, 212);
            color: white;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background-color: rgba(107, 107, 212, 0.7);
        }

       

        body {
            height: 100vh;
            font-family: "Segoe UI", sans-serif;
            background-color: rgb(191, 191, 247);
            overflow: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        form {
            width: 500px;
            padding: 20px;
            background: white;
            border-radius: 10px;

            display: flex;
            flex-direction: column;

            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }

        .feilds {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 8px 0;
        }

        .buttonFeilds {
            margin-top: 15px;
            padding-top: 12px;
            border-top: 1px solid rgba(0, 0, 0, 0.08);

            display: flex;
            justify-content: space-evenly;
        }

        

        .TableContainer {
            width: 700px;
            margin-top: 25px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
            overflow: auto;
        }


        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f7f7f7;
        }

        thead th {
            padding: 12px;
            text-align: left;
            font-size: 14px;
            border-bottom: 2px solid #e6e6e6;
        }

        tbody td {
            padding: 12px;
            border-bottom: 1px solid #eeeeee;
            font-size: 14px;
        }

        tbody tr:hover {
            background-color: #fafafa;
        }
    </style>
</head>

<body>

<script>

function handleLoad(event) {
    event.preventDefault();
    calculateEMI();
}

function calculateEMI() {

    var P = parseFloat(document.getElementById("loanAmount").value);
    var annualRate = parseFloat(document.getElementById("interest").value);
    var months = parseFloat(document.getElementById("tennure").value);

    var r = annualRate/12/100;

    var emi = P * r * Math.pow(1+r, months) / (Math.pow(1+r, months) - 1);

    var balance = P;

    var tableBody = document.getElementById("scheduleBody");
    tableBody.innerHTML = "";
    
    
    for(var i=1; i<=months; i++){

        var interest = balance * r;

        var principal = emi - interest;

        var remainingBalance = balance - principal;

        var row = `
        <tr>
            <td>${i}</td>
            <td>${balance.toFixed(2)}</td>
            <td>${emi.toFixed(2)}</td>
            <td>${principal.toFixed(2)}</td>
            <td>${interest.toFixed(2)}</td>
            <td>${remainingBalance.toFixed(2)}</td>
        </tr>
        `;

        tableBody.innerHTML += row;

        balance = remainingBalance;
    }
}

function Reset() {
    document.getElementById("loanAmount").value = "";
    document.getElementById("interest").value = "";
    document.getElementById("tennure").value = "";
    document.getElementById("scheduleBody").innerHTML = "";
}

</script>

<h1>Enter Details for EMI Calculation</h1>

<div class="formContainer">

    <form onsubmit="handleLoad(event)">

        <div class="feilds">
            <label>Loan Amount</label>
            <input type="number" id="loanAmount" placeholder="Enter loan amount">
        </div>

        <div class="feilds">
            <label>Interest</label>
            <input type="number" id="interest" placeholder="Enter interest rate">
        </div>

        <div class="feilds">
            <label>Tennure</label>
            <input type="number" id="tennure" placeholder="Enter tenure">
        </div>

        <div class="buttonFeilds">
            <button type="submit">Calculate EMI</button>
            <button type="reset" onclick="Reset()">Reset</button>
        </div>

    </form>

</div>

<h1>Table Content</h1>

<div class="TableContainer">

    <table>

        <thead>
            <tr>
                <th>SNO</th>
                <th>Loan Left</th>
                <th>EMI</th>
                <th>Principal</th>
                <th>Interest</th>
                <th>Remaining Balance</th>
            </tr>
        </thead>

        <tbody id="scheduleBody">
            <tr id="defaultRow">
                <td>-</td>
                <td>-</td>
                <td>-</td>
                <td>-</td>
                <td>-</td>
                <td>-</td>

            </tr>
        </tbody>

    </table>

</div>

</body>
</html>
