<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

    <script>
        function getFormData(){
            var name = document.getElementById("name").value;
            var dob = document.getElementById("dob").value;
            var pan = document.getElementById("pan").value;
            var email = document.getElementById("email").value;
            var password = document.getElementById("password").value;
            var city = document.getElementById("city").value;
            console.log("Data in the form : ");
            console.log("Name : ",name);
            console.log("DOB : ",dob);
            console.log("PAN : ",pan);
            console.log("Email : ",email);
            console.log("Password : ",password);
            console.log("City : ",city);
        }

        function  handleFlag(){
            let name = "";
            name = window.prompt("Enter Name : ");
            for(var i=0; i<name.length ; i++){
                return (
                    <div> 
                        {name.substring(0,i+1)}
                    </div>   
                    )
                }
           
        }

    </script>


<div>
    <button onclick="handleFlag()">
        Click To see the Flag
    </button>
</div>
<main class="page">

<section class="card">

<h1>Registration Form</h1>
<p class="subtitle">Please fill in the information below and submit.</p>

<form class="form" action="#" method="post" autocomplete="on">

<div class="field-row">
<label for="name">Full Name</label>
<input id="name" name="name" type="text" placeholder="e.g. Jane Doe" required>
</div>

<div class="field-row">
<label for="dob">Date of Birth</label>
<input id="dob" name="dob" type="date" required>
</div>

<div class="field-row">
<label for="pan">PAN Number</label>
<input id="pan" name="pan" type="text" placeholder="AAAAA9999A"
pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}" maxlength="10" required>
<small class="hint">Format: 5 letters + 4 digits + 1 letter</small>
</div>


<!-- COURSES (CHECKBOXES) -->

<div class="field-row">
<label>Courses</label>

<label class="checkbox">
<input type="checkbox" name="course" value="Web Development">
<span>Web Development</span>
</label>

<label class="checkbox">
<input type="checkbox" name="course" value="Data Science">
<span>Data Science</span>
</label>

<label class="checkbox">
<input type="checkbox" name="course" value="UI/UX Design">
<span>UI / UX Design</span>
</label>

<label class="checkbox">
<input type="checkbox" name="course" value="Cloud Computing">
<span>Cloud Computing</span>
</label>

<label class="checkbox">
<input type="checkbox" name="course" value="Software Engineering">
<span>Software Engineering</span>
</label>

</div>


<div class="field-row">
<label for="email">Email Address</label>
<input id="email" name="email" type="email" placeholder="you@example.com" required>
</div>


<div class="field-row">
<label for="password">Password</label>
<input id="password" name="password" type="password"
placeholder="Enter password" minlength="8" required>
<small class="hint">Minimum 8 characters.</small>
</div>


<!-- CITY DROPDOWN -->

<div class="field-row">
<label for="city">City</label>

<select id="city" name="city" required>

<option value="">Select City</option>
<option>Delhi</option>
<option>Mumbai</option>
<option>Bangalore</option>
<option>Chandigarh</option>
<option>Pune</option>
<option>Hyderabad</option>
<option>Jaipur</option>

</select>

</div>


<fieldset class="fieldset">

<legend>More details</legend>

<div class="field-row field-row--inline">

<label class="radio">
<input type="radio" name="gender" value="female" required>
<span>Female</span>
</label>

<label class="radio">
<input type="radio" name="gender" value="male">
<span>Male</span>
</label>

<label class="radio">
<input type="radio" name="gender" value="other">
<span>Other</span>
</label>

</div>


<div class="field-row">
<label for="phone">Phone</label>
<input id="phone" name="phone" type="tel"
placeholder="+91 12345 67890"
pattern="[0-9+\- ]{7,20}">
</div>


<div class="field-row">

<label class="checkbox">
<input type="checkbox" name="terms" required>
<span>I agree to the terms and conditions.</span>
</label>

</div>

</fieldset>


<div class="button-row">

<button type="reset" class="btn btn-secondary">
Reset
</button>

<button type="submit" class="btn btn-primary">
Submit
</button>

</div>

</form>

</section>

</main>

</body>
</html>
