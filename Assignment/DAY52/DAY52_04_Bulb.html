<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulb</title>
</head>
<body onload="defaultBulbState()" style="display:flex; justify-content:centre; align-items: center; height: 100%; width: 100%;" >
    <script>
        function defaultBulbState() {
            var bulbOn = document.getElementById("bulbon");
            var bulbOff = document.getElementById("bulboff");
            bulbOn.style.display = "block";
            bulbOff.style.display = "none";
        }
        
        function turnBulbOn() {
            var bulbOn = document.getElementById("bulbon");
            var bulbOff = document.getElementById("bulboff");
            bulbOn.style.display = "block";
            bulbOff.style.display = "none";
        }

        function turnBulbOff() {
            var bulbOn = document.getElementById("bulbon");
            var bulbOff = document.getElementById("bulboff");
            bulbOn.style.display = "none";
            bulbOff.style.display = "block";
        }
    </script>
    <div style="display: flex; flex-direction: column;justify-content: center; align-items: center;  width: 50vw;" class="container">
        <div style=" width: 50%; padding: 1rem; display: flex; justify-content: space-around; margin: 1rem;">
            <button style="padding: 0.75rem; border: none; outline: none; background-color: grey; cursor: pointer;" onclick="turnBulbOn()">
                Turn bulb on
            </button>
            <button style="padding: 0.75rem; border: none; outline: none; background-color: grey; cursor: pointer;" onclick="turnBulbOff()">
                Turn bulb off
            </button>
            
        </div>
        <div style="overflow: hidden; width: 400px; height: 400px; display: flex; justify-content: center; align-items: center;">
            <img src="src/bulbon.png" alt="Bulb" style="width: 200px; height: auto;" id="bulbon">
            <img src="src/bulboff.png" alt="Bulb" style="width: 200px; height: auto;" id="bulboff">
        </div>

    </div>
</body>
</html>
